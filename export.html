<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>内网数据传输工具 - 发送端</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            padding: 48px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            min-height: 100vh;
        }

        .container { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 18px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.55); 
            width: 100%; 
            max-width: 760px; 
            border: 1px solid #334155;
            transition: box-shadow 0.3s ease;
        }
        .container:hover {
            box-shadow: 0 16px 48px rgba(0,0,0,0.65);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 28px;
            font-size: 26px;
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }
        .toolbar-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
            margin-right: auto;
            letter-spacing: 0.3px;
            user-select: none;
        }
        .toolbar-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 7px 16px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        .toolbar-btn:hover {
            background: #334155;
            color: #f8fafc;
            border-color: #6366f1;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(99, 102, 241, 0.15);
        }
        .toolbar-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .toolbar-btn.btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: #ef4444;
            box-shadow: 0 3px 10px rgba(239, 68, 68, 0.15);
        }

        /* ===== 文本输入区 ===== */
        .textarea-wrapper {
            margin-bottom: 22px;
        }
        textarea { 
            width: 100%; 
            height: 230px; 
            padding: 16px; 
            border: 1px solid #475569; 
            border-top: none;
            border-radius: 0 0 10px 10px; 
            resize: vertical; 
            font-family: 'Fira Code', 'Consolas', 'Cascadia Code', monospace; 
            font-size: 14px;
            background: #020617; 
            color: #38bdf8;
            line-height: 1.6;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
        }
        textarea::placeholder {
            color: #475569;
        }

        /* ===== 主按钮 ===== */
        .main-btn { 
            padding: 15px 24px; 
            background: linear-gradient(135deg, #4f46e5, #6366f1); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            width: 100%; 
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }
        .main-btn:hover { 
            background: linear-gradient(135deg, #4338ca, #4f46e5); 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.45);
        }
        .main-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        /* ===== 状态文本 ===== */
        .status { 
            margin-top: 18px; 
            font-size: 14px; 
            color: #94a3b8; 
            text-align: center; 
            font-weight: 600;
            min-height: 22px;
            transition: color 0.3s;
            line-height: 1.5;
        }

        /* ===== 二维码网格 ===== */
        #qrcode { 
            margin-top: 32px; 
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
        }

        /* ===== 分块卡片 ===== */
        .qr-card {
            border: 1px solid #334155;
            padding: 26px;
            border-radius: 14px;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.3s, 
                        box-shadow 0.3s;
        }
        .qr-card:hover {
            transform: translateY(-3px);
            border-color: #6366f1;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.12);
        }
        .qr-card-title {
            margin: 0 0 16px 0;
            color: #818cf8;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .qr-image-wrapper {
            background: white;
            padding: 14px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .qr-card-tip {
            font-size: 13px;
            color: #64748b;
            margin-top: 14px;
            margin-bottom: 0;
        }

        /* ===== 返回顶部悬浮按钮 ===== */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid #475569;
            backdrop-filter: blur(10px);
            color: #f8fafc;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            background: #4f46e5;
            border-color: #6366f1;
            transform: scale(1.08) translateY(-2px);
        }
        .back-to-top svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ===== 模式切换器 ===== */
        .mode-selector {
            display: flex;
            background: #020617;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            position: relative;
            border: 1px solid #334155;
            z-index: 1;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .mode-btn.active {
            color: #ffffff;
        }
        .mode-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 9px;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }

        /* ===== 文件投递舱 ===== */
        .file-zone-wrapper {
            margin-bottom: 22px;
            display: none; /* 默认隐藏，切模式时激活 */
        }
        .file-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            background: rgba(2, 6, 23, 0.6);
            border: 2px dashed #475569;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(8px);
        }
        .file-zone:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.12);
        }
        .file-zone.dragover {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.06);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.18);
            transform: scale(0.995);
        }
        .file-icon {
            font-size: 46px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.25));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        
        /* ===== 已选文件卡片 ===== */
        .file-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px 18px;
            border-radius: 8px;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            margin-top: 16px;
            animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .file-badge {
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .file-info {
            flex: 1;
            text-align: left;
            overflow: hidden;
        }
        .file-name {
            font-size: 14px;
            font-weight: 700;
            color: #f8fafc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .file-size {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
        }
        .file-remove {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .file-remove:hover {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== 高级调节滑块 ===== */
        .advanced-panel {
            margin-top: 20px;
            margin-bottom: 20px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 18px;
            text-align: left;
        }
        .advanced-title {
            font-size: 12px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .slider-wrapper input[type="range"] {
            flex: 1;
            accent-color: #6366f1;
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
        }
        .slider-val {
            font-family: monospace;
            font-size: 13px;
            color: #38bdf8;
            font-weight: 700;
            min-width: 32px;
            text-align: right;
        }

        /* ===== 极速全屏轮播大厅 ===== */
        .playback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .playback-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.65), 0 0 40px rgba(99,102,241,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 90vw;
            max-height: 75vh;
            border: 2px solid #6366f1;
            transform: scale(0.95);
            animation: popUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popUp {
            to { transform: scale(1); }
        }
        .playback-qr-wrapper {
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 10px;
            border-radius: 12px;
        }
        .playback-qr-wrapper svg, .playback-qr-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .playback-header {
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .playback-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 动态环形倒计时进度 */
        .playback-progress-box {
            position: relative;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-ring {
            transform: rotate(-90deg);
        }
        .progress-ring__circle {
            stroke-dasharray: 188.4;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
        }
        .playback-countdown {
            position: absolute;
            font-family: monospace;
            font-size: 15px;
            font-weight: 800;
            color: #38bdf8;
        }

        /* 悬浮控制栏 */
        .playback-control-bar {
            position: absolute;
            bottom: 40px;
            background: rgba(30, 41, 59, 0.78);
            border: 1px solid #475569;
            backdrop-filter: blur(12px);
            padding: 14px 28px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.55);
            max-width: 90vw;
            z-index: 2002;
            animation: slideUpPlay 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes slideUpPlay {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .playback-btn {
            background: #0f172a;
            border: 1px solid #334155;
            color: #cbd5e1;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        .playback-btn:hover {
            background: #334155;
            color: #f8fafc;
            border-color: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        .playback-btn:active {
            transform: translateY(0);
        }
        .playback-btn.btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .playback-divider {
            width: 1px;
            height: 28px;
            background: #334155;
        }
        .playback-info {
            font-size: 14px;
            font-weight: 700;
            color: #cbd5e1;
            min-width: 160px;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .playback-speed-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
        }
        .playback-speed-box input[type="range"] {
            width: 90px;
            accent-color: #6366f1;
            cursor: pointer;
            height: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>内网数据传输工具 - 发送端</h2>
    
    <!-- 模式切换器 -->
    <div class="mode-selector">
        <div class="mode-btn active" id="btnModeText" onclick="switchMode('text')">📝 文本传输模式</div>
        <div class="mode-btn" id="btnModeFile" onclick="switchMode('file')">📁 文件传输模式</div>
        <div class="mode-slider" id="modeSlider"></div>
    </div>
    
    <!-- 文本传输区域 -->
    <div id="textModeArea" class="textarea-wrapper">
        <!-- 工具栏：粘贴 / 清空 -->
        <div class="toolbar">
            <span class="toolbar-label">输入区操作</span>
            <button class="toolbar-btn" onclick="pasteText()">
                📋 一键粘贴
            </button>
            <button class="toolbar-btn btn-danger" onclick="clearText()">
                🗑️ 一键清空
            </button>
        </div>
        <textarea id="inputText" placeholder="请在此输入或粘贴需要传输的文本数据、配置文件或源码..."></textarea>
    </div>
    
    <!-- 文件传输区域 (默认隐藏) -->
    <div id="fileModeArea" class="file-zone-wrapper">
        <div class="file-zone" id="fileDropZone" onclick="triggerFileSelect()">
            <div class="file-icon">📁</div>
            <div style="font-size: 15px; font-weight: 700; color: #93c5fd; margin-bottom: 8px;">
                将文件拖拽至此舱室，或点击浏览本地文件
            </div>
            <div style="font-size: 13px; color: #64748b; font-weight: 600;">
                支持任何格式，推荐单文件 &lt; 5MB
            </div>
            <input type="file" id="fileSelectInput" onchange="handleFileSelect(event)">
        </div>
        <!-- 已选择文件展示卡片 -->
        <div id="selectedFileCard" style="display: none;"></div>
    </div>
    
    <!-- 高级调节滑块面板 -->
    <div class="advanced-panel">
        <div class="advanced-title">
            <span>⚙️ 二维码单块最大容量 (决定分片总数)</span>
            <span class="slider-val" id="optimalSizeVal">200 字符</span>
        </div>
        <div class="slider-wrapper">
            <input type="range" id="optimalSizeSlider" min="100" max="500" step="10" value="200" oninput="updateSliderVal(this.value)">
        </div>
    </div>
    
    <button class="main-btn" onclick="generateQR()">✨ 生成分块二维码序列</button>
    <button class="main-btn" id="btnSlideshow" onclick="startSlideshow()" style="margin-top: 12px; background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35); display: none;">🖥️ 进入极速全屏轮播放映大厅</button>
    <div id="status" class="status">等待输入数据...</div>
    <div id="qrcode"></div>
</div>

<!-- 全屏放映大厅遮罩 -->
<div id="playbackOverlay" class="playback-overlay">
    <!-- 头部：标题与倒计时环 -->
    <div class="playback-header">
        <div class="playback-title">🌌 极速全屏轮播放映大厅</div>
        <div class="playback-progress-box">
            <svg class="progress-ring" width="64" height="64">
                <circle class="progress-ring__circle" stroke="#38bdf8" stroke-width="4" fill="transparent" r="30" cx="32" cy="32"/>
            </svg>
            <div id="playbackCountdown" class="playback-countdown">1.0s</div>
        </div>
    </div>
    
    <!-- 播放卡片 -->
    <div class="playback-card">
        <div id="playbackQr" class="playback-qr-wrapper"></div>
    </div>
    
    <!-- 悬浮控制栏 -->
    <div class="playback-control-bar">
        <button class="playback-btn" onclick="prevSlide()" title="上一张">⏮️</button>
        <button class="playback-btn" id="btnTogglePlay" onclick="togglePlay()" title="播放/暂停">⏸️</button>
        <button class="playback-btn" onclick="nextSlide()" title="下一张">⏭️</button>
        <div class="playback-divider"></div>
        <div id="playbackInfo" class="playback-info">分片 1 / 5 (第 1 张)</div>
        <div class="playback-divider"></div>
        <div class="playback-speed-box">
            <span>⏱️ 速度:</span>
            <input type="range" id="playbackSpeedSlider" min="200" max="3000" step="100" value="1000" oninput="updatePlaybackSpeed(this.value)">
            <span id="playbackSpeedVal" style="font-family: monospace; color: #38bdf8; min-width: 50px;">1.0s</span>
        </div>
        <div class="playback-divider"></div>
        <button class="playback-btn btn-danger" onclick="closeSlideshow()" title="退出放映">🚪 退出</button>
    </div>
</div>

<!-- 返回顶部浮动按钮 -->
<div id="backToTop" class="back-to-top" onclick="scrollToTop()" title="回到顶部">
    <svg viewBox="0 0 24 24">
        <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
    </svg>
</div>

// =========================================================================
// 极简 Hash 算法生成任务 ID，防止不同传输任务的分片交叉污染
// =========================================================================
function stringHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0; // 转成 32 位有符号整数
    }
    return Math.abs(hash).toString(16);
}

// =========================================================================
// 核心逻辑：一键粘贴、一键清空、分块二维码生成
// =========================================================================
// =========================================================================
// 核心状态机与工作模式切换
// =========================================================================
let currentMode = 'text'; // 'text' 或 'file'
let selectedFile = null;
let optimalSize = 200;

function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    
    const btnText = document.getElementById("btnModeText");
    const btnFile = document.getElementById("btnModeFile");
    const slider = document.getElementById("modeSlider");
    const textArea = document.getElementById("textModeArea");
    const fileArea = document.getElementById("fileModeArea");
    const statusEl = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");
    
    qrContainer.innerHTML = "";
    statusEl.innerText = "等待输入或投递数据...";
    statusEl.style.color = "#94a3b8";
    
    if (mode === 'text') {
        btnText.classList.add("active");
        btnFile.classList.remove("active");
        slider.style.transform = "translateX(0)";
        textArea.style.display = "block";
        fileArea.style.display = "none";
    } else {
        btnText.classList.remove("active");
        btnFile.classList.add("active");
        slider.style.transform = "translateX(100%)";
        textArea.style.display = "none";
        fileArea.style.display = "block";
        if (selectedFile) {
            const formattedSize = formatBytes(selectedFile.size);
            statusEl.innerText = `📂 已选定文件: ${selectedFile.name} (${formattedSize})。准备就绪。`;
            statusEl.style.color = "#60a5fa";
        }
    }
}

function updateSliderVal(val) {
    optimalSize = parseInt(val);
    document.getElementById("optimalSizeVal").innerText = `${optimalSize} 字符`;
}

// =========================================================================
// 文件模式拖拽及投递交互逻辑
// =========================================================================
function triggerFileSelect() {
    document.getElementById("fileSelectInput").click();
}

function handleFileSelect(event) {
    const files = event.target.files;
    if (files.length > 0) {
        handleFile(files[0]);
    }
}

function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const card = document.getElementById("selectedFileCard");
    const formattedSize = formatBytes(file.size);
    const extension = file.name.split('.').pop().toUpperCase();
    
    card.innerHTML = `
        <div class="file-card">
            <div class="file-badge">.${extension}</div>
            <div class="file-info">
                <div class="file-name" title="${file.name}">${file.name}</div>
                <div class="file-size">文件体积: ${formattedSize}</div>
            </div>
            <button class="file-remove" onclick="removeSelectedFile(event)">🗑️</button>
        </div>
    `;
    card.style.display = "block";
    
    const statusEl = document.getElementById("status");
    statusEl.innerText = `📂 已成功选定文件: ${file.name} (${formattedSize})。已准备就绪，可以生成分块。`;
    statusEl.style.color = "#34d399";
}

function removeSelectedFile(event) {
    if (event) event.stopPropagation();
    selectedFile = null;
    document.getElementById("fileSelectInput").value = "";
    document.getElementById("selectedFileCard").style.display = "none";
    document.getElementById("qrcode").innerHTML = "";
    
    const statusEl = document.getElementById("status");
    statusEl.innerText = "🗑️ 文件已移除。";
    statusEl.style.color = "#94a3b8";
}

function formatBytes(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

// 挂载拖拽投递区事件
setTimeout(() => {
    const dropZone = document.getElementById("fileDropZone");
    if (!dropZone) return;
    
    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });
    
    dropZone.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
    });
    
    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });
}, 100);

// =========================================================================
// 极简 ArrayBuffer 转 Base64，纯前端离线运行
// =========================================================================
function arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const len = bytes.byteLength;
    for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return window.btoa(binary);
}

// =========================================================================
// 核心逻辑：一键粘贴、一键清空、分块二维码生成
// =========================================================================
async function pasteText() {
    var statusEl = document.getElementById("status");
    try {
        if (!navigator.clipboard || !navigator.clipboard.readText) {
            statusEl.innerText = "❌ 当前浏览器限制读取剪贴板，请使用 Ctrl+V 粘贴。";
            statusEl.style.color = "#f87171";
            return;
        }
        const text = await navigator.clipboard.readText();
        if (text) {
            document.getElementById("inputText").value = text;
            statusEl.innerText = "📋 已成功从剪贴板粘贴文本！";
            statusEl.style.color = "#34d399";
        } else {
            statusEl.innerText = "⚠️ 剪贴板中未发现文本数据。";
            statusEl.style.color = "#fbbf24";
        }
    } catch (err) {
        statusEl.innerText = "❌ 粘贴失败，请在授权弹窗中选择允许，或使用 Ctrl+V。";
        statusEl.style.color = "#f87171";
    }
}

function clearText() {
    document.getElementById("inputText").value = "";
    document.getElementById("qrcode").innerHTML = "";
    var statusEl = document.getElementById("status");
    statusEl.innerText = "🗑️ 数据已清空。";
    statusEl.style.color = "#94a3b8";
}

function generateQR() {
    var statusEl = document.getElementById("status");
    var qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";
    
    if (currentMode === 'text') {
        var text = document.getElementById("inputText").value;
        if (!text) {
            statusEl.innerText = "⚠️ 请输入内容后再生成！";
            statusEl.style.color = "#f87171";
            return;
        }
        
        statusEl.innerText = "⏳ 正在分析长文本数据，构建分块序列...";
        statusEl.style.color = "#60a5fa";
        
        try {
            var textId = stringHash(text);
            var chunks = [];
            var currentIndex = 0;
            
            while (currentIndex < text.length) {
                var trySize = Math.min(optimalSize, text.length - currentIndex);
                var success = false;
                var finalUtf8Text = "";
                var base64Text = "";
                
                while (!success && trySize > 0) {
                    var finalChunkText = text.substring(currentIndex, currentIndex + trySize);
                    try {
                        finalUtf8Text = unescape(encodeURIComponent(finalChunkText));
                        base64Text = window.btoa(finalUtf8Text);
                        success = true; 
                    } catch (err) {
                        trySize--; 
                    }
                }
                
                if (trySize === 0) {
                    throw new Error("分块碰撞到 0 字符，可能包含格式损坏的控制符。");
                }
                
                chunks.push(base64Text);
                currentIndex += trySize;
            }
            
            renderQRSequence(chunks, textId, null);
        } catch (err) {
            statusEl.innerText = `❌ 生成失败，异常原因: ${err.message}`;
            statusEl.style.color = "#f87171";
        }
    } else {
        // 文件传输模式
        if (!selectedFile) {
            statusEl.innerText = "⚠️ 请选择文件后再生成！";
            statusEl.style.color = "#f87171";
            return;
        }
        
        statusEl.innerText = "⏳ 正在读取文件并进行智能编码中...";
        statusEl.style.color = "#60a5fa";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const arrayBuffer = e.target.result;
                const fileBase64 = arrayBufferToBase64(arrayBuffer);
                const textId = stringHash(fileBase64 + selectedFile.name);
                
                // 由于 base64 只有 ASCII 字符，分块切割极其直接安全
                const chunks = [];
                let currentIndex = 0;
                while (currentIndex < fileBase64.length) {
                    const chunk = fileBase64.substring(currentIndex, currentIndex + optimalSize);
                    chunks.push(chunk);
                    currentIndex += optimalSize;
                }
                
                renderQRSequence(chunks, textId, selectedFile.name);
            } catch (err) {
                statusEl.innerText = `❌ 文件编码失败: ${err.message}`;
                statusEl.style.color = "#f87171";
            }
        };
        reader.onerror = function() {
            statusEl.innerText = "❌ 读取本地文件失败，请重试！";
            statusEl.style.color = "#f87171";
        };
        reader.readAsArrayBuffer(selectedFile);
    }
}

// 统一渲染二维码卡片序列
function renderQRSequence(chunks, textId, filename) {
    const statusEl = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");
    const totalChunks = chunks.length;
    
    // 如果是文件模式，对文件名进行 Base64 编码以在头部中传输
    const base64Filename = filename ? window.btoa(unescape(encodeURIComponent(filename))) : "";
    
    for (let i = 0; i < totalChunks; i++) {
        const chunkIndex = i + 1;
        const base64Data = chunks[i];
        
        // 封装自适应协议头：如果是文件，带上 FILE 标识
        const protocolPayload = filename 
            ? `[CHUNK:${chunkIndex}|TOTAL:${totalChunks}|HASH:${textId}|FILE:${base64Filename}]${base64Data}`
            : `[CHUNK:${chunkIndex}|TOTAL:${totalChunks}|HASH:${textId}]${base64Data}`;
            
        const card = document.createElement("div");
        card.className = "qr-card";
        
        const title = document.createElement("h3");
        title.className = "qr-card-title";
        const typeLabel = filename ? "📁 文件" : "📦 文本";
        title.innerText = `${typeLabel}第 ${chunkIndex} 部分 / 共 ${totalChunks} 部分 (任务 ID: ${textId})`;
        card.appendChild(title);
        
        const imgWrapper = document.createElement("div");
        imgWrapper.className = "qr-image-wrapper";
        card.appendChild(imgWrapper);
        
        const tip = document.createElement("p");
        tip.className = "qr-card-tip";
        
        if (filename) {
            tip.innerText = `分片编码长度: ${base64Data.length} 字符 | 目标文件名: ${filename}`;
        } else {
            const estimatedCharLen = Math.round(base64Data.length * 0.75);
            tip.innerText = `分片编码长度: ${base64Data.length} 字符 (约 ${estimatedCharLen} 原始字符)`;
        }
        card.appendChild(tip);
        qrContainer.appendChild(card);
        
        new QRCode(imgWrapper, {
            text: protocolPayload,
            width: 320,
            height: 320,
            colorDark: "#020617",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L
        });
    }
    
    const sizeLabel = filename ? formatBytes(selectedFile.size) : `${document.getElementById("inputText").value.length} 字符`;
    statusEl.innerText = `🎉 渲染成功！总计 ${sizeLabel}，切分为 ${totalChunks} 个分块二维码。请逐一扫描。`;
    statusEl.style.color = "#34d399";
}

// =========================================================================
// 返回顶部伴随滚动微交互
// =========================================================================
var backToTopBtn = document.getElementById("backToTop");

window.onscroll = function() {
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        backToTopBtn.classList.add("show");
    } else {
        backToTopBtn.classList.remove("show");
    }
};

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

// =========================================================================
// 极速全屏轮播放映大厅核心逻辑
// =========================================================================
let slideshowChunks = [];
let slideshowTextId = "";
let slideshowFilename = "";
let currentSlideIndex = 0;
let slideshowIntervalId = null;
let countdownIntervalId = null;
let slideshowSpeed = 1000; // 默认 1000ms 轮播一次
let isSlideshowPlaying = false;
let countdownTimeLeft = 1000; // 倒计时毫秒数
const countdownStep = 50; // 每 50ms 刷新一次倒计时

// 升级 renderQRSequence 逻辑以保存分片并显示放映按钮
const originalRenderQRSequence = renderQRSequence;
renderQRSequence = function(chunks, textId, filename) {
    originalRenderQRSequence(chunks, textId, filename);
    
    // 缓存分片，以供幻灯片轮播调用
    slideshowChunks = chunks;
    slideshowTextId = textId;
    slideshowFilename = filename;
    currentSlideIndex = 0;
    
    // 展现幻灯片放映大厅入口按钮
    const btnSlideshow = document.getElementById("btnSlideshow");
    if (btnSlideshow) {
        btnSlideshow.style.display = "block";
    }
};

// 升级 switchMode 逻辑，当切换模式时，隐藏幻灯片入口按钮，防止脏状态
const originalSwitchMode = switchMode;
switchMode = function(mode) {
    originalSwitchMode(mode);
    const btnSlideshow = document.getElementById("btnSlideshow");
    if (btnSlideshow) {
        btnSlideshow.style.display = "none";
    }
    slideshowChunks = [];
    slideshowTextId = "";
    slideshowFilename = "";
};

// 开启放映
function startSlideshow() {
    if (slideshowChunks.length === 0) return;
    
    const overlay = document.getElementById("playbackOverlay");
    overlay.style.display = "flex";
    
    currentSlideIndex = 0;
    isSlideshowPlaying = true;
    document.getElementById("btnTogglePlay").innerText = "⏸️";
    
    // 初始化环形倒计时周长属性
    const circle = document.querySelector('.progress-ring__circle');
    if (circle) {
        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = 0;
    }
    
    updateSlide();
    startTimer();
}

// 关闭放映
function closeSlideshow() {
    const overlay = document.getElementById("playbackOverlay");
    overlay.style.display = "none";
    stopTimer();
    isSlideshowPlaying = false;
}

// 开启定时器与倒计时
function startTimer() {
    stopTimer();
    if (!isSlideshowPlaying) return;
    
    countdownTimeLeft = slideshowSpeed;
    
    // 高频倒计时刷新（50ms 级别，非常流畅）
    countdownIntervalId = setInterval(() => {
        countdownTimeLeft -= countdownStep;
        if (countdownTimeLeft <= 0) {
            countdownTimeLeft = 0;
        }
        
        // 更新倒计时文字
        const sec = (countdownTimeLeft / 1000).toFixed(1);
        document.getElementById("playbackCountdown").innerText = `${sec}s`;
        
        // 更新进度条环
        const circle = document.querySelector('.progress-ring__circle');
        if (circle) {
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (countdownTimeLeft / slideshowSpeed) * circumference;
            circle.style.strokeDashoffset = offset;
        }
        
        if (countdownTimeLeft <= 0) {
            nextSlide();
        }
    }, countdownStep);
}

// 停止定时器与倒计时
function stopTimer() {
    if (countdownIntervalId) {
        clearInterval(countdownIntervalId);
        countdownIntervalId = null;
    }
}

// 更新当前放映的二维码
function updateSlide() {
    const total = slideshowChunks.length;
    const index = currentSlideIndex + 1;
    const base64Data = slideshowChunks[currentSlideIndex];
    
    // 拼接分块协议头
    const base64Filename = slideshowFilename ? window.btoa(unescape(encodeURIComponent(slideshowFilename))) : "";
    const protocolPayload = slideshowFilename 
        ? `[CHUNK:${index}|TOTAL:${total}|HASH:${slideshowTextId}|FILE:${base64Filename}]${base64Data}`
        : `[CHUNK:${index}|TOTAL:${total}|HASH:${slideshowTextId}]${base64Data}`;
        
    // 清空并重新生成二维码
    const qrWrapper = document.getElementById("playbackQr");
    qrWrapper.innerHTML = "";
    
    new QRCode(qrWrapper, {
        text: protocolPayload,
        width: 380,
        height: 380,
        colorDark: "#020617",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L
    });
    
    // 更新大厅状态文本
    const typeLabel = slideshowFilename ? "📁 文件" : "📦 文本";
    document.getElementById("playbackInfo").innerText = `${typeLabel}第 ${index} / ${total} 部分 (任务 ID: ${slideshowTextId})`;
    
    // 重新开始倒计时
    if (isSlideshowPlaying) {
        startTimer();
    } else {
        // 暂停状态下，清空倒计时环
        const circle = document.querySelector('.progress-ring__circle');
        if (circle) {
            circle.style.strokeDashoffset = 0;
        }
        document.getElementById("playbackCountdown").innerText = "⏸️";
    }
}

// 下一张
function nextSlide() {
    if (slideshowChunks.length === 0) return;
    currentSlideIndex = (currentSlideIndex + 1) % slideshowChunks.length;
    updateSlide();
}

// 上一张
function prevSlide() {
    if (slideshowChunks.length === 0) return;
    currentSlideIndex = (currentSlideIndex - 1 + slideshowChunks.length) % slideshowChunks.length;
    updateSlide();
}

// 播放 / 暂停
function togglePlay() {
    isSlideshowPlaying = !isSlideshowPlaying;
    const btn = document.getElementById("btnTogglePlay");
    if (isSlideshowPlaying) {
        btn.innerText = "⏸️";
        btn.title = "暂停";
        startTimer();
    } else {
        btn.innerText = "▶️";
        btn.title = "播放";
        stopTimer();
        const circle = document.querySelector('.progress-ring__circle');
        if (circle) {
            circle.style.strokeDashoffset = 0;
        }
        document.getElementById("playbackCountdown").innerText = "⏸️";
    }
}

// 速度滑块微调 (ms)
function updatePlaybackSpeed(val) {
    slideshowSpeed = parseInt(val);
    document.getElementById("playbackSpeedVal").innerText = `${(slideshowSpeed / 1000).toFixed(1)}s`;
    if (isSlideshowPlaying) {
        startTimer(); // 重置计时周期
    }
}
</script>
